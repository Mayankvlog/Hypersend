worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # DNS resolver for Docker containers
    resolver 127.0.0.11 valid=30s;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    server_tokens on;

    # CRITICAL: Client body size limit for file uploads
    # Default is 1MB, which causes 413 errors on image uploads >1MB
    # Set to 20M to allow profile/group image uploads (typical images 2-5MB)
    # Cloudflare free plan supports up to 100MB, so this is safe
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;

    # Upstream blocks for Docker services
    upstream frontend_upstream {
        server frontend:80;
        keepalive 32;
    }

    upstream backend_upstream {
        server backend:8000;
        keepalive 32;
    }

    # HTTP server block for zaply.in.net - Redirect to HTTPS
    server {
        listen 80;
        server_name zaply.in.net www.zaply.in.net;

        # Health check endpoint (HTTP)
        location = /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "healthy\n";
        }

        # Serve robots.txt for SEO
        location = /robots.txt {
            root /var/www/html;
            add_header Content-Type "text/plain; charset=utf-8" always;
            add_header Cache-Control "public, max-age=86400" always;
            access_log off;
            try_files $uri =404;
        }

        # Serve sitemap.xml for SEO
        location = /sitemap.xml {
            root /var/www/html;
            add_header Content-Type "application/xml; charset=utf-8" always;
            add_header Cache-Control "public, max-age=604800" always;
            access_log off;
            try_files $uri =404;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # HTTPS server block for zaply.in.net
    server {
        listen 443 ssl;
        http2 on;
        server_name zaply.in.net www.zaply.in.net;

        # SSL Certificate Configuration
        ssl_certificate /etc/letsencrypt/live/zaply.in.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/zaply.in.net/privkey.pem;
        
        # SSL Security Settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # CRITICAL: Health check endpoint must route to backend FIRST (before /api/ catch-all)
        # Frontend initialization checks /health to verify backend connectivity
        location = /health {
            proxy_pass http://backend_upstream/health;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Health checks must complete quickly
            proxy_connect_timeout 10s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
            
            # Log health checks at debug level to avoid spam
            access_log off;
        }

        # API proxy - routes to backend for all /api/ requests
        location /api/ {
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # CRITICAL: WebSocket upgrade headers for /api/v1/ws or similar endpoints
            # These headers tell Nginx and the backend that this is a WebSocket upgrade request
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Standard timeouts for API requests (not WebSocket)
            # WebSocket connections handled separately at /ws/
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_buffering off;            # Don't buffer responses (streaming, uploads)
            proxy_request_buffering off;    # Don't buffer requests (streaming, uploads)
            
            # CRITICAL: Pass cookies through proxy for SameSite=None support
            # These headers ensure cookies are properly forwarded between client and backend
            proxy_pass_request_headers on;
            proxy_pass_request_body on;
            # CRITICAL FIX: Explicitly forward cookies for HTTPOnly cookie support
            # This is MANDATORY for session persistence across page refreshes
            proxy_set_header Cookie $http_cookie;
            # Allow Set-Cookie headers from backend to client
            proxy_pass_header Set-Cookie;
            # CRITICAL: Preserve Set-Cookie headers with all attributes (domain, path, secure, httponly, samesite)
            proxy_cookie_path / /;
            proxy_cookie_domain ~^(.*)$ "zaply.in.net";
            proxy_cookie_flags ~ secure httponly samesite=none;
        }
        
        # Backend fallback for 502 errors
        location @backend_fallback {
            internal;
            add_header Content-Type application/json;
            return 502 '{"error": "Backend temporarily unavailable", "status": 502, "retry_after": 30}';
        }
        
        # Custom error pages for 502/503/504
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }

        # Block .map file access (security)
        location ~* \.map$ {
            access_log off;
            add_header Content-Type text/plain;
            return 204 "No Content";
        }

        # Serve robots.txt for SEO - BEFORE fallback routing
        location = /robots.txt {
            root /var/www/html;
            add_header Content-Type "text/plain; charset=utf-8" always;
            add_header Cache-Control "public, max-age=86400" always;
            access_log off;
            try_files $uri =404;
        }

        # Serve sitemap.xml for SEO - BEFORE fallback routing
        location = /sitemap.xml {
            root /var/www/html;
            add_header Content-Type "application/xml; charset=utf-8" always;
            add_header Cache-Control "public, max-age=604800" always;
            access_log off;
            try_files $uri =404;
        }

        # WebSocket proxy
        location /ws/ {
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }

        # Frontend static assets with aggressive caching
        # Flutter build outputs include content hash in filenames (e.g., main.abc123.js)
        # These can be cached indefinitely since they're immutable
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|wasm)$ {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            
            expires 1y;
            add_header Cache-Control "public, immutable, max-age=31536000" always;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log off;
        }

        # Canvas Kit and other cached Flutter Web assets
        location /canvaskit/ {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            
            expires 1y;
            add_header Cache-Control "public, immutable, max-age=31536000" always;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log off;
        }

        # Flutter Web application SPA routing with clean URLs (no # symbols)
        # CRITICAL: This block enables clean path-based routing through GoRouter
        # Frontend container nginx is configured with try_files to serve index.html
        # for all non-existent routes, making this transparent to clients
        location / {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_buffering off;
            
            # Pass original request details to frontend
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            # SPA navigation timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            # If upstream returns 404 (shouldn't happen with frontend try_files, but fallback)
            error_page 404 = @history_fallback;
        }

        # Fallback location for 404 errors - serve index.html for SPA routing
        # Handles cases where frontend might return 404 (e.g., validation errors)
        location @history_fallback {
            internal;
            rewrite ^ /index.html break;
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            # Don't cache index.html - always get fresh copy
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }

        # Security Headers - Apply to all responses
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # CRITICAL: CORS headers for SameSite=None cookie support
        # These headers tell browsers to allow cross-origin requests with credentials (cookies)
        # Required for persistent login (20-day session) to work across multiple requests
        add_header Access-Control-Allow-Origin "https://zaply.in.net" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, HEAD, PATCH" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, Accept, Origin, X-Requested-With, Accept-Language, Content-Language, X-Access-Token" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age "86400" always;
        add_header Vary "Origin" always;
        
        # Content Security Policy for SPA - Restrictive with specific origins
        # Removed broad "https:" fallback and enumerated only required origins
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'unsafe-hashes' https://www.gstatic.com https://static.cloudflareinsights.com 'sha256-r2PNjThllgdBaYUa95209Pxv4APgPWGQcGQYCbC+tec=' 'sha256-OGkvjyOzo4Dcn5b5ORPkLdAl0bwBpdGrX64YBDX79x0=' 'sha256-3OiZOi6Fff/gl99kZwpu1vwNYJzHLQ1HlnNjpmORflU='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://zaply.in.net https://www.gstatic.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://zaply.in.net https://www.gstatic.com https://fonts.gstatic.com https://static.cloudflareinsights.com wss://zaply.in.net; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self';" always;
    }
}