name: Test & Deploy Backend

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run Backend Tests
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio
          
      - name: Run tests
        run: |
          # Auto-discover tests from pyproject.toml testpaths config
          # Exit code 0 if no tests found (CI must never fail due to missing tests)
          pytest -v --tb=short || [ $? -eq 5 ] && exit 0 || exit $?
        timeout-minutes: 15

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    env:
      IMAGE_NAME: yourusername/hypersend-backend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Wait for Docker Hub availability (retry logic)
        run: |
          echo "🔄 Checking Docker Hub connectivity..."
          max_attempts=5
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            if curl -s -m 10 https://registry-1.docker.io/v2/ > /dev/null 2>&1; then
              echo "✅ Docker Hub is reachable"
              exit 0
            fi
            attempt=$((attempt + 1))
            if [ $attempt -lt $max_attempts ]; then
              wait_time=$((2 ** attempt))  # Exponential backoff: 2s, 4s, 8s, 16s
              echo "⏳ Docker Hub not responding (attempt $attempt/$max_attempts), waiting ${wait_time}s..."
              sleep $wait_time
            fi
          done
          echo "⚠️  Docker Hub still not responding, proceeding with login (retry in action will handle)"
          exit 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true  # Push to registry
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,mode=max
          cache-to: type=registry,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            BUILDKIT_CONTEXT_KEEP_GIT_DIR=1
            DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
            DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        timeout-minutes: 30

      - name: Deploy to VPS (Docker Compose, password SSH)
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          timeout: 20m
          command_timeout: 20m
          script_stop: true
          script: |
            # Use deployment scripts with localhost development environment
            echo "📋 Starting deployment with optimized scripts..."
            
            # Set environment variables for localhost development
            export API_BASE_URL=http://localhost:8000/api/v1
            export APP_URL=http://localhost:3000
            export DEBUG=true
            export DOMAIN_NAME=localhost
            export SSL_CERT_PATH=/etc/letsencrypt/live/localhost/fullchain.pem
            export SSL_KEY_PATH=/etc/letsencrypt/live/localhost/privkey.pem
            export CORS_ORIGINS='["http://localhost:3000", "http://localhost:8000", "http://127.0.0.1:3000", "http://127.0.0.1:8000"]'
            export EMAIL_FROM=noreply@localhost.com
            export SENDER_NAME=Hypersend Support
            export RATE_LIMIT_ENABLED=true
            export USE_MOCK_DB=true
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            export DOCKERHUB_TOKEN=${{ secrets.DOCKERHUB_TOKEN }}
            
            if [ -f "/hypersend/Hypersend/deploy-all.sh" ]; then
              echo "🔄 Using full deployment script..."
              chmod +x /hypersend/Hypersend/deploy-all.sh
              /hypersend/Hypersend/deploy-all.sh
            elif [ -f "/hypersend/Hypersend/deploy-backend.sh" ]; then
              echo "🔄 Using backend deployment script..."
              chmod +x /hypersend/Hypersend/deploy-backend.sh
              /hypersend/Hypersend/deploy-backend.sh
            else
              echo "❌ Deployment scripts not found, using manual deployment..."
              set -e
              cd /hypersend/Hypersend
              sudo systemctl start docker || true
              docker compose down --remove-orphans 2>/dev/null || true
              docker compose up -d --build backend
              sleep 30
              
              # Health check with retry (localhost endpoint)
              for i in {1..20}; do
                if curl -sf http://localhost:8000/api/v1/health >/dev/null 2>&1; then
                  echo "✅ Backend deployment completed!"
                  exit 0
                fi
                echo "⏳ Health check $i/20, waiting 3s..."
                sleep 3
              done
              
              echo "❌ Backend health check failed"
              docker compose logs backend --tail 50 2>/dev/null || true
              exit 1