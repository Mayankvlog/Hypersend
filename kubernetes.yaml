---
# ===================================================================
# NAMESPACE AND RBAC
# ===================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: hypersend
  labels:
    name: hypersend
    security: e2ee-enabled
    monitoring: enabled
  annotations:
    description: "E2EE Multi-Device Messaging Platform - Production"
    security-tier: "critical"

---
# ServiceAccount for applications
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hypersend-app
  namespace: hypersend
  labels:
    app: hypersend

---
# Role for reading ConfigMaps and Secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hypersend-deployment-role
  namespace: hypersend
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]

---
# RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hypersend-deployment-rolebinding
  namespace: hypersend
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: hypersend-deployment-role
subjects:
- kind: ServiceAccount
  name: hypersend-app
  namespace: hypersend

---
# ResourceQuota to prevent resource exhaustion
apiVersion: v1
kind: ResourceQuota
metadata:
  name: hypersend-quota
  namespace: hypersend
spec:
  hard:
    requests.cpu: "30"
    requests.memory: "60Gi"
    limits.cpu: "60"
    limits.memory: "120Gi"
    pods: "100"
    services: "20"
    persistentvolumeclaims: "10"
  scopeSelector:
    matchExpressions:
    - operator: In
      scopeName: PriorityClass
      values: ["high", "medium"]

---
# Network Policy - Deny all by default, then allow explicitly
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hypersend-default-deny
  namespace: hypersend
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress

---
# Network Policy - Allow DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hypersend-allow-dns
  namespace: hypersend
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53

---
# Network Policy - Allow nginx to backend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hypersend-allow-nginx-to-backend
  namespace: hypersend
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: nginx
    ports:
    - protocol: TCP
      port: 8000

---
# Network Policy - Allow backend to redis
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hypersend-allow-backend-to-redis
  namespace: hypersend
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: backend
    ports:
    - protocol: TCP
      port: 6379

---
# Network Policy - Allow nginx ingress from internet
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hypersend-allow-nginx-ingress
  namespace: hypersend
spec:
  podSelector:
    matchLabels:
      app: nginx
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 443

---
# ===================================================================
# SECRETS AND CONFIGMAPS
# ===================================================================

# IMPORTANT: Use this as a template only. Never commit actual secrets with real values.
# See EXTERNAL SECRET MANAGEMENT section below for Vault/AWS Secrets Manager setup.

apiVersion: v1
kind: Secret
metadata:
  name: hypersend-secrets
  namespace: hypersend
  labels:
    app: hypersend
    security: critical
type: Opaque
stringData:
  # Database Credentials (PLACEHOLDER - replace with actual values)
  mongodb-uri: "mongodb+srv://USERNAME:PASSWORD@cluster.mongodb.net/database?retryWrites=true&w=majority"
  
  # Application Secrets (PLACEHOLDER - generate with: openssl rand -hex 32)
  secret-key: "PLACEHOLDER_GENERATE_WITH_openssl_rand_-hex_32"
  jwt-secret-key: "PLACEHOLDER_GENERATE_WITH_openssl_rand_-hex_32"
  jwt-refresh-secret-key: "PLACEHOLDER_GENERATE_WITH_openssl_rand_-hex_32"
  
  # Redis Authentication (PLACEHOLDER)
  redis-password: "PLACEHOLDER_SECURE_32_CHAR_PASSWORD"
  redis-url: "redis://:PLACEHOLDER_PASSWORD@redis:6379/0"
  
  # SMTP Credentials (PLACEHOLDER)
  smtp-username: "noreply@zaply.in.net"
  smtp-password: "PLACEHOLDER_GMAIL_APP_PASSWORD"
  email-from: "noreply@zaply.in.net"
  
  # AWS S3 Integration (PLACEHOLDER - optional, only if using S3)
  aws-access-key-id: "PLACEHOLDER_AWS_ACCESS_KEY"
  aws-secret-access-key: "PLACEHOLDER_AWS_SECRET_KEY"
  
  # E2EE Keys (PLACEHOLDER - managed by application)
  e2ee-master-key: "PLACEHOLDER_E2EE_MASTER_KEY"
  
  # TLS Certificates (see TLS Certificate Management section)
  tls-certificate: |
    -----BEGIN CERTIFICATE-----
    PLACEHOLDER_CERTIFICATE_DATA
    -----END CERTIFICATE-----
  tls-private-key: |
    -----BEGIN PRIVATE KEY-----
    PLACEHOLDER_PRIVATE_KEY_DATA
    -----END PRIVATE KEY-----

---
# ConfigMap - Non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: hypersend-config
  namespace: hypersend
  labels:
    app: hypersend
data:
  # Environment
  ENVIRONMENT: "production"
  DEBUG: "false"
  
  # API Configuration
  API_BASE_URL: "https://zaply.in.net/api/v1"
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  ALLOWED_ORIGINS: "https://zaply.in.net,https://www.zaply.in.net"
  
  # Database Configuration
  MONGODB_ATLAS_ENABLED: "true"
  DATABASE_NAME: "Hypersend"
  USE_MOCK_DB: "false"
  
  # Rate Limiting
  RATE_LIMIT_PER_USER: "1000"
  RATE_LIMIT_WINDOW_SECONDS: "3600"
  
  # Token Expiration (20-day session requirement)
  ACCESS_TOKEN_EXPIRE_MINUTES: "28800"      # 20 days
  REFRESH_TOKEN_EXPIRE_DAYS: "20"
  UPLOAD_TOKEN_EXPIRE_HOURS: "480"          # 20 days
  PASSWORD_RESET_EXPIRE_MINUTES: "30"
  
  # Redis Configuration
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_MAX_CONNECTIONS: "100"
  
  # File Upload Configuration
  SERVER_STORAGE_ENABLED: "true"
  STORAGE_PATH: "/app/storage"
  TEMP_STORAGE_PATH: "/app/temp"
  UPLOAD_DIR: "/app/uploads"
  MAX_FILE_SIZE_BYTES: "16106127360"        # 15GB
  CHUNK_SIZE: "4194304"                      # 4MB
  FILE_RETENTION_HOURS: "120"                # 5 days
  AUTO_CLEANUP_ENABLED: "true"
  ALLOWED_FILE_TYPES: "jpg,jpeg,png,gif,pdf,doc,docx,txt,mp4,mp3,zip,avi,wmv,flv,webm,mpg,rar,7z,iso"
  
  # Email Configuration
  ENABLE_EMAIL: "true"
  ENABLE_PASSWORD_RESET: "true"
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USE_TLS: "true"
  SENDER_NAME: "Zaply Support"
  
  # AWS S3 Configuration (if using S3)
  AWS_REGION: "us-east-1"
  S3_BUCKET: "hypersend-prod"
  
  # Logging
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  
  # Monitoring
  ENABLE_METRICS: "true"
  METRICS_PORT: "9090"

---
# ConfigMap - nginx configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: hypersend
  labels:
    app: nginx
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;

    events {
      worker_connections 4096;
      use epoll;
      multi_accept on;
    }

    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;

      # Logging
      log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct="$upstream_connect_time" '
                      'uht="$upstream_header_time" urt="$upstream_response_time"';

      access_log /var/log/nginx/access.log main buffer=64k flush=2s;

      # Performance
      sendfile on;
      tcp_nopush on;
      tcp_nodelay on;
      keepalive_timeout 120;
      keepalive_requests 1000;
      types_hash_max_size 4096;

      # Large File Support (15GB uploads)
      client_max_body_size 15G;
      client_body_buffer_size 16m;
      client_header_buffer_size 8k;
      large_client_header_buffers 8 32k;

      # Timeouts for large file transfers
      client_body_timeout 3600s;
      client_header_timeout 60s;
      send_timeout 3600s;
      proxy_connect_timeout 300s;
      proxy_send_timeout 3600s;
      proxy_read_timeout 3600s;

      # Compression
      gzip on;
      gzip_vary on;
      gzip_proxied any;
      gzip_comp_level 6;
      gzip_min_length 1000;
      gzip_disable "msie6";
      gzip_types text/plain text/css text/xml text/javascript
                 application/javascript application/json application/xml+rss;

      # Caching
      proxy_cache_path /var/cache/nginx/cache levels=1:2 keys_zone=hypersend_cache:10m max_size=1g inactive=60m;
      proxy_cache_key "$scheme$request_method$host$request_uri";

      # Upstream Services
      upstream backend_service {
        least_conn;
        server backend:8000 max_fails=3 fail_timeout=30s;
        keepalive 256;
      }

      upstream frontend_service {
        server frontend:80;
        keepalive 64;
      }

      # HTTP server - redirect to HTTPS
      server {
        listen 80;
        server_name zaply.in.net www.zaply.in.net;
        return 301 https://$server_name$request_uri;
      }

      # HTTPS server
      server {
        listen 443 ssl http2;
        server_name zaply.in.net www.zaply.in.net;

        # SSL/TLS Configuration
        ssl_certificate /etc/nginx/tls/tls.crt;
        ssl_certificate_key /etc/nginx/tls/tls.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Health check endpoint
        location /health {
          access_log off;
          add_header Content-Type text/plain;
          return 200 "healthy\n";
        }

        # API routes
        location /api/ {
          proxy_pass http://backend_service;
          proxy_http_version 1.1;
          
          # Headers
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          
          # WebSocket support
          proxy_buffering off;
          proxy_request_buffering off;
          
          # Error handling
          proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
          proxy_next_upstream_tries 3;
          proxy_next_upstream_timeout 30s;
        }

        # WebSocket routes
        location ~ ^/ws {
          proxy_pass http://backend_service;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_buffering off;
        }

        # Frontend routes
        location / {
          proxy_pass http://frontend_service;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_redirect off;
        }

        # Disable source maps
        location ~* \.map$ {
          access_log off;
          return 204;
        }

        # SEO files
        location = /robots.txt {
          add_header Cache-Control "public, max-age=86400" always;
          access_log off;
        }

        location = /sitemap.xml {
          add_header Content-Type "application/xml" always;
          add_header Cache-Control "public, max-age=604800" always;
          access_log off;
        }
      }
    }

---
# ===================================================================
# PERSISTENT VOLUME CLAIMS
# ===================================================================

# Redis Storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: hypersend
  labels:
    app: redis
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fast  # VERIFY THIS EXISTS: kubectl get storageclass
  resources:
    requests:
      storage: 20Gi

---
# Backend Storage (sensitive data)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-storage-pvc
  namespace: hypersend
  labels:
    app: backend
spec:
  accessModes:
    - ReadWriteMany  # For multi-replica sharing
  storageClassName: fast
  resources:
    requests:
      storage: 200Gi

---
# Backend Uploads (15GB file support)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-uploads-pvc
  namespace: hypersend
  labels:
    app: backend
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: fast
  resources:
    requests:
      storage: 500Gi

---
# Backend Temporary Storage (for transfer staging)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-temp-pvc
  namespace: hypersend
  labels:
    app: backend
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: fast
  resources:
    requests:
      storage: 100Gi

---
# Nginx Cache Storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nginx-cache-pvc
  namespace: hypersend
  labels:
    app: nginx
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: fast
  resources:
    requests:
      storage: 10Gi

---
# ===================================================================
# TRAY CERTIFICATE MANAGEMENT
# ===================================================================
# Option 1: Manual Secret creation (one-time)
# kubectl create secret tls letsencrypt-tls \
#   --cert=/path/to/fullchain.pem \
#   --key=/path/to/privkey.pem \
#   -n hypersend

# Option 2: Using cert-manager (recommended for production)
# Install cert-manager: helm install cert-manager jetstack/cert-manager
# Then uncomment the ClusterIssuer and Certificate below:

