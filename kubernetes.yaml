#     server: https://acme-v02.api.letsencrypt.org/directory
#     email: admin@zaply.in.net
#     privateKeySecretRef:
#       name: letsencrypt-prod-key
#     solvers:
#     - http01:
#         ingress:
#           class: nginx
#
# ---
# apiVersion: cert-manager.io/v1
# kind: Certificate
# metadata:
#   name: zaply-cert
#   namespace: hypersend
# spec:
#   secretName: letsencrypt-tls
#   issuerRef:
#     name: letsencrypt-prod
