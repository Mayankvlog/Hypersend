#   commonName: zaply.in.net
#   dnsNames:
#   - zaply.in.net
#   - www.zaply.in.net

---
# ===================================================================
# REDIS DEPLOYMENT
# ===================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: hypersend
  labels:
    app: redis
  annotations:
    deployment: redis-single-node
    note: "Recommend Redis Sentinel or Cluster for HA"
spec:
  replicas: 1
  strategy:
    type: Recreate  # No rolling update for stateful Redis
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9121"
    spec:
      serviceAccountName: hypersend-app
      securityContext:
        fsGroup: 999
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
      restartPolicy: Always
      containers:
      - name: redis
        image: redis:7.2.4-alpine  # PINNED VERSION
        imagePullPolicy: IfNotPresent
        command:
          - redis-server
          - "--requirepass"
          - "$(REDIS_PASSWORD)"
          - "--appendonly"
          - "yes"
          - "--appendfsync"
          - "everysec"
          - "--maxmemory"
          - "8gb"
          - "--maxmemory-policy"
          - "allkeys-lru"
          - "--save"
          - "900 1"
          - "--save"
          - "300 10"
          - "--save"
          - "60 10000"
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: hypersend-secrets
              key: redis-password
        ports:
        - name: redis
          containerPort: 6379
          protocol: TCP
        resources:
          requests:
            memory: "4Gi"
            cpu: "500m"
          limits:
            memory: "8Gi"
            cpu: "2000m"
        volumeMounts:
        - name: redis-storage
          mountPath: /data
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - redis-cli -a $REDIS_PASSWORD ping
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - redis-cli -a $REDIS_PASSWORD ping
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true
      volumes:
      - name: redis-storage
        persistentVolumeClaim:
          claimName: redis-pvc

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: hypersend
  labels:
    app: redis
spec:
  type: ClusterIP
  clusterIP: None  # Headless service
  selector:
    app: redis
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
    protocol: TCP

---
# ===================================================================
# BACKEND DEPLOYMENT
# ===================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: hypersend
  labels:
    app: backend
    tier: api
spec:
  replicas: 2  # START SMALL - HPA will scale
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Zero downtime deployment
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        tier: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: hypersend-app
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 3000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - backend
              topologyKey: kubernetes.io/hostname
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      containers:
      - name: backend
        image: ghcr.io/mayankvlog/hypersend-backend:v1.4.2  # PINNED VERSION
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        # Database
        - name: MONGODB_ATLAS_ENABLED
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: MONGODB_ATLAS_ENABLED
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: hypersend-secrets
              key: mongodb-uri
        - name: DATABASE_NAME
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: DATABASE_NAME
        - name: USE_MOCK_DB
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: USE_MOCK_DB
        
        # API Configuration
        - name: API_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: API_BASE_URL
        - name: API_HOST
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: API_HOST
        - name: API_PORT
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: API_PORT
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: hypersend-secrets
              key: secret-key
        - name: API_SECRET
          valueFrom:
            secretKeyRef:
              name: hypersend-secrets
              key: secret-key
        
        # Security
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: hypersend-secrets
              key: secret-key
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: hypersend-secrets
              key: jwt-secret-key
        - name: JWT_REFRESH_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: hypersend-secrets
              key: jwt-refresh-secret-key
        
        # Token Expiration (20-day sessions)
        - name: ACCESS_TOKEN_EXPIRE_MINUTES
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: ACCESS_TOKEN_EXPIRE_MINUTES
        - name: REFRESH_TOKEN_EXPIRE_DAYS
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: REFRESH_TOKEN_EXPIRE_DAYS
        - name: UPLOAD_TOKEN_EXPIRE_HOURS
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: UPLOAD_TOKEN_EXPIRE_HOURS
        - name: PASSWORD_RESET_EXPIRE_MINUTES
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: PASSWORD_RESET_EXPIRE_MINUTES
        
        # Redis (FIXED: includes password now)
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: hypersend-secrets
              key: redis-url
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: REDIS_PORT
        - name: REDIS_DB
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: REDIS_DB
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: hypersend-secrets
              key: redis-password
        
        # File Storage
        - name: SERVER_STORAGE_ENABLED
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: SERVER_STORAGE_ENABLED
        - name: STORAGE_PATH
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: STORAGE_PATH
        - name: TEMP_STORAGE_PATH
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: TEMP_STORAGE_PATH
        - name: UPLOAD_DIR
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: UPLOAD_DIR
        - name: MAX_FILE_SIZE_BYTES
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: MAX_FILE_SIZE_BYTES
        - name: CHUNK_SIZE
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: CHUNK_SIZE
        
        # Email
        - name: ENABLE_EMAIL
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: ENABLE_EMAIL
        - name: ENABLE_PASSWORD_RESET
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: ENABLE_PASSWORD_RESET
        - name: SMTP_HOST
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: SMTP_HOST
        - name: SMTP_PORT
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: SMTP_PORT
        - name: SMTP_USERNAME
          valueFrom:
            secretKeyRef:
              name: hypersend-secrets
              key: smtp-username
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: hypersend-secrets
              key: smtp-password
        - name: SMTP_USE_TLS
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: SMTP_USE_TLS
        - name: EMAIL_FROM
          valueFrom:
            secretKeyRef:
              name: hypersend-secrets
              key: email-from
        
        # Logging & Monitoring
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: LOG_LEVEL
        - name: LOG_FORMAT
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: LOG_FORMAT
        - name: ENABLE_METRICS
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: ENABLE_METRICS
        - name: METRICS_PORT
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: METRICS_PORT
        
        # Environment
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: ENVIRONMENT
        - name: DEBUG
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: DEBUG
        
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        volumeMounts:
        - name: storage
          mountPath: /app/storage
        - name: uploads
          mountPath: /app/uploads
        - name: temp
          mountPath: /app/temp
        - name: tmp
          mountPath: /tmp
        
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: false  # Needs write for uploads
      
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: backend-storage-pvc
      - name: uploads
        persistentVolumeClaim:
          claimName: backend-uploads-pvc
      - name: temp
        persistentVolumeClaim:
          claimName: backend-temp-pvc
      - name: tmp
        emptyDir:
          sizeLimit: 10Gi

---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: hypersend
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
  - name: http
    port: 8000
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP

---
# Backend HPA (Horizontal Pod Autoscaler)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: hypersend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 20  # REDUCED from 100 for resource-constrained environments
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60

---
# Backend Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: hypersend
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: backend

---
# ===================================================================
# FRONTEND DEPLOYMENT
# ===================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: hypersend
  labels:
    app: frontend
    tier: web
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        tier: web
    spec:
      serviceAccountName: hypersend-app
      securityContext:
        fsGroup: 101
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - frontend
              topologyKey: kubernetes.io/hostname
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      containers:
      - name: frontend
        image: ghcr.io/mayankvlog/hypersend-frontend:v2.1.0  # PINNED VERSION
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: API_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: hypersend-config
              key: API_BASE_URL
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: var-run
          mountPath: /var/run
        - name: var-cache
          mountPath: /var/cache/nginx
      volumes:
      - name: tmp
        emptyDir:
          sizeLimit: 100Mi
      - name: var-run
        emptyDir:
          sizeLimit: 100Mi
      - name: var-cache
        emptyDir:
          sizeLimit: 500Mi

---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: hypersend
  labels:
    app: frontend
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP

---
# Frontend HPA
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: hypersend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80

---
# ===================================================================
# NGINX REVERSE PROXY DEPLOYMENT
# ===================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: hypersend
  labels:
    app: nginx
    tier: ingress
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
        tier: ingress
    spec:
      serviceAccountName: hypersend-app
      securityContext:
        fsGroup: 101
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - nginx
              topologyKey: kubernetes.io/hostname
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      containers:
      - name: nginx
        image: nginx:1.25.3-alpine  # PINNED VERSION
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        - name: https
          containerPort: 443
          protocol: TCP
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          exec:
            command:
            - nginx
            - "-t"
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
          readOnly: true
        - name: tls-certs
          mountPath: /etc/nginx/tls
          readOnly: true
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: var-run
          mountPath: /var/run
        - name: var-tmp
          mountPath: /var/tmp
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            add:
              - NET_BIND_SERVICE
            drop:
              - ALL
          readOnlyRootFilesystem: true
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
          items:
          - key: nginx.conf
            path: nginx.conf
      - name: tls-certs
        secret:
          secretName: letsencrypt-tls
          defaultMode: 0400
      -name: nginx-cache
        persistentVolumeClaim:
          claimName: nginx-cache-pvc
      - name: var-run
        emptyDir:
          sizeLimit: 100Mi
      - name: var-tmp
        emptyDir:
          sizeLimit: 1Gi

---
# Nginx Service - ClusterIP (use Ingress for external access)
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: hypersend
  labels:
    app: nginx
spec:
  type: ClusterIP
  selector:
    app: nginx
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: https
    port: 443
    targetPort: https
    protocol: TCP

---
# Nginx Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nginx-pdb
  namespace: hypersend
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: nginx

---
# ===================================================================
# INGRESS CONFIGURATION (Recommended over LoadBalancer)
# ===================================================================
# Before deploying, ensure nginx-ingress-controller is installed:
# helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
# helm install nginx ingress-nginx/ingress-nginx -n ingress-nginx --create-namespace

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hypersend-ingress
  namespace: hypersend
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"  # If using cert-manager
    nginx.ingress.kubernetes.io/proxy-body-size: "15G"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "backend"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - zaply.in.net
    - www.zaply.in.net
    secretName: letsencrypt-tls
  rules:
  - host: zaply.in.net
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nginx
            port:
              number: 80
  - host: www.zaply.in.net
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nginx
            port:
              number: 80

---
# ===================================================================
# ALTERNATIVE: NodePort Service (if no cloud LoadBalancer)
# ===================================================================
# Use this if your cluster doesn't support LoadBalancer provisioning

apiVersion: v1
kind: Service
metadata:
  name: nginx-nodeport
  namespace: hypersend
  labels:
    app: nginx
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
  - name: http
    port: 80
    targetPort: http
    nodePort: 30080
    protocol: TCP
  - name: https
    port: 443
    targetPort: https
    nodePort: 30443
    protocol: TCP
