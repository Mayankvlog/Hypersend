services:
  nginx:
    image: nginx:alpine
    container_name: hypersend_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ${LETSENCRYPT_DIR:-/etc/letsencrypt}:/etc/letsencrypt:ro
      - nginx_cache:/var/cache/nginx
      - /var/www/html:/var/www/html
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    entrypoint: []
    command: ['nginx', '-g', 'daemon off;']
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hypersend_network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    environment:
      # Suppress SSL verification warnings for self-signed certs in dev
      - NGINX_ALLOW_UNSAFE_SSL=true
      - NGINX_API_BASE_URL=${API_BASE_URL:-https://zaply.in.net/api/v1}
      - NGINX_API_HOST=${API_HOST:-0.0.0.0}
      - NGINX_API_KEY=${API_KEY:-hypersend_secure_api_key}
      - NGINX_API_SECRET=${API_SECRET:-hypersend_secure_api_secret}
      # CRITICAL FIX: Add nginx timeout configurations for 15GB files
      - NGINX_PROXY_READ_TIMEOUT=3600  # 1 hour for large file downloads
      - NGINX_PROXY_SEND_TIMEOUT=3600  # 1 hour for large file uploads
      - NGINX_PROXY_CONNECT_TIMEOUT=300  # 5 minutes for backend connection
      - NGINX_CLIENT_BODY_TIMEOUT=3600  # 1 hour for client body upload
      - NGINX_CLIENT_MAX_BODY_SIZE=18G  # Allow 15GB files + overhead
      # Enhanced error handling configuration
      - NGINX_ERROR_PAGE_TIMEOUT=30  # Error page timeout
      - NGINX_MAX_RETRIES=7  # Maximum retry attempts
      - NGINX_RETRY_DELAY=5  # Delay between retries
      # Production domain configuration
      - DOMAIN_NAME=zaply.in.net
      - SSL_CERT_PATH=/etc/letsencrypt/live/zaply.in.net/fullchain.pem
      - SSL_KEY_PATH=/etc/letsencrypt/live/zaply.in.net/privkey.pem

  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - hypersend_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    sysctls:
      - net.core.somaxconn=65535


  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: mayank035/hypersend-backend:latest
    container_name: hypersend_backend
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      # ===== DATABASE CONFIGURATION =====
      # PROD: MongoDB Atlas cloud connection only - MUST EXACTLY MATCH USER REQUIREMENTS
      MONGODB_ATLAS_ENABLED: ${MONGODB_ATLAS_ENABLED:-true}
      MONGODB_URI: ${MONGODB_URI:-mongodb+srv://mayanllr0311_db_user:JBkAZin8lytTK6vg@cluster.mongodb.net/database?retryWrites=true&w=majority}
      DATABASE_NAME: ${DATABASE_NAME:-Hypersend}
      USE_MOCK_DB: "false"

      # ===== API CONFIGURATION =====
      API_BASE_URL: ${API_BASE_URL:-https://zaply.in.net/api/v1}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_KEY: ${API_KEY:-hypersend_secure_api_key}
      API_SECRET: ${API_SECRET:-hypersend_secure_api_secret}

      # ===== RATE LIMITING & SECURITY =====
      RATE_LIMIT_PER_USER: 100
      RATE_LIMIT_WINDOW: 3600

      # ===== CORS CONFIGURATION =====
      # PROD: Production HTTPS domains only
      ALLOWED_ORIGINS: https://zaply.in.net,https://www.zaply.in.net

      # ===== ENVIRONMENT =====
      DEBUG: "false"
      ENVIRONMENT: "production"

      # ===== SECURITY =====
      # CRITICAL SECURITY FIX: Use environment variables, never hardcode secrets
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY:-change-me-in-production}
      # CRITICAL FIX: Token expiration must be 20 days (1,728,000 seconds) for production zaply.in.net
      # Values loaded from .env file to ensure consistency across environments
      # Access tokens: 28,800 minutes = 20 days = 1,728,000 seconds
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-28800}
      # Refresh tokens: 20 days matches session requirement
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-20}
      # Upload tokens: 480 hours = 20 days for large file transfers
      UPLOAD_TOKEN_EXPIRE_HOURS: ${UPLOAD_TOKEN_EXPIRE_HOURS:-480}
      # Password reset tokens: 30 minutes for security
      PASSWORD_RESET_EXPIRE_MINUTES: ${PASSWORD_RESET_EXPIRE_MINUTES:-30}

      # ===== REDIS CONFIGURATION =====
      # CRITICAL FIX: Use authenticated Redis connection with password
      # REDIS_URL is constructed by backend/config.py from individual env vars
      # This ensures proper password inclusion in the connection string
      # Individual components are read from .env file automatically:
      # REDIS_PASSWORD, REDIS_HOST, REDIS_PORT, REDIS_DB
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # ===== FILE STORAGE =====
      # CRITICAL: Container-internal paths ONLY - no localhost or host paths
      SERVER_STORAGE_ENABLED: "true"
      STORAGE_PATH: /app/storage
      TEMP_STORAGE_PATH: /app/temp
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE_BYTES: "16106127360"  # 15 GiB
      CHUNK_SIZE: "4194304"  # 4 MiB
      FILE_RETENTION_HOURS: "120"  # 120 hours = 5 days
      AUTO_CLEANUP_ENABLED: "true"
      ALLOWED_FILE_TYPES: "jpg,jpeg,png,gif,pdf,doc,docx,txt,mp4,mp3,zip,avi,wmv,flv,webm,mpg,wmf,wmv,exe,msi,deb,rar,7z,iso"

      # ===== LOGGING =====
      LOG_LEVEL: "INFO"
      LOG_FORMAT: "json"

      # ===== MONITORING =====
      ENABLE_METRICS: "true"
      METRICS_PORT: "9090"

      # ===== EMAIL CONFIGURATION =====
      ENABLE_EMAIL: ${ENABLE_EMAIL:-true}
      ENABLE_PASSWORD_RESET: ${ENABLE_PASSWORD_RESET:-true}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-noreply@zaply.in.net}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-dummy_app_password_configure_in_env}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@zaply.in.net}
      SENDER_NAME: ${SENDER_NAME:-Hypersend Support}
    volumes:
      - ./data:/data
      - ./backend/uploads:/app/uploads
      - ./data/temp:/app/temp
      - ./data/storage:/app/storage
    # Run as root to handle permissions, then switch in entrypoint
    user: "0:0"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - hypersend_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f -s http://backend:8000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_BASE_URL: https://zaply.in.net/api/v1
        VALIDATE_CERTIFICATES: "true"
    image: mayank035/hypersend-frontend:latest
    container_name: hypersend_frontend
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - NODE_ENV=production
      - API_BASE_URL=https://zaply.in.net/api/v1
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - hypersend_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://frontend/health"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  hypersend_network: {}

volumes:
  redis_data:
    driver: local
  nginx_cache:
    driver: local